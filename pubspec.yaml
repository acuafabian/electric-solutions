name: electric_solutions
description: App de diseño, cálculo y presupuesto de instalaciones eléctricas residenciales (RETIE / NTC 2050)
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado global
  provider: ^6.1.2

  # Persistencia local
  shared_preferences: ^2.2.3

  # Serialización JSON
  json_annotation: ^4.9.0

  # Exportar PDF (futuro)
  pdf: ^3.10.8
  printing: ^5.13.1

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
